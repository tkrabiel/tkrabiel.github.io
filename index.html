<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CST Portal - Welcome</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .welcome-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; max-width: 450px; border-top: 6px solid #004a99; }
        h1 { color: #004a99; margin-top: 0; }
        p { color: #555; margin-bottom: 30px; font-size: 1.1em; }
        
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-upload { background: #004a99; color: white; }
        .btn-new { background: #28a745; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="welcome-card">
    <h1>WELCOME SCREEN!!!l</h1>
    <p>Have you previously filled this out and gotten a JSON?</p>
    
    <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">
        I HAVE A JSON FILE TO UPLOAD
    </button>
    <input type="file" id="fileInput" accept=".json" onchange="handleFileUpload(event)">

    <div style="margin: 20px 0; font-weight: bold; color: #999; position: relative;">
        <span style="background: white; padding: 0 10px;">OR</span>
    </div>

    <button class="btn btn-new" onclick="startFresh()">
        DON'T HAVE A SAVED FILE YET
    </button>
</div>

<script>
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                // 1. Validate it's actually JSON
                const content = e.target.result;
                JSON.parse(content); 

                // 2. "Hand-off": Save to localStorage so Master Page can see it
                localStorage.setItem('cst_data_transfer', content);

                // 3. Move to the Master Page
                window.location.href = 'cst_master_application.html';
            } catch (err) {
                alert("Error: The file selected is not a valid JSON file.");
            }
        };
        reader.readAsText(file);
    }

    function startFresh() {
        // Ensure no old data is hanging around
        localStorage.removeItem('cst_data_transfer');
        window.location.href = 'cst_master_application.html';
    }
</script>

</body>
</html>
